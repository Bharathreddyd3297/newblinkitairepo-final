# =============================================================================
# cart-service — standalone Compose file
# -----------------------------------------------------------------------------
# Runs cart-service + its dedicated Postgres in isolation. For the full
# platform (auth + product + cart + their DBs on a shared network) use the
# root-level docker-compose.platform.yml instead.
#
# Secrets are sourced from a sibling `.env` file (copy from
# ../.env.example). JWT_SECRET MUST match the value used by auth-service.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: blinkit-cart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blinkit_cart}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - cart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blinkit_cart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blinkit-net

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: blinkit/cart-service:1.0.0
    container_name: blinkit-cart-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-blinkit_cart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # MUST be the exact same secret used by auth-service and product-service.
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_BASE_URL: ${PRODUCT_SERVICE_BASE_URL:-http://product-service:8082}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - blinkit-net

volumes:
  cart_postgres_data:

networks:
  blinkit-net:
    driver: bridge
    name: blinkit-net
