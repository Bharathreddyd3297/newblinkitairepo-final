# =============================================================================
# product-service — Spring Boot configuration
# -----------------------------------------------------------------------------
# All secrets and externally-injected values are read from environment
# variables. For local development the workspace-root .env (copied from
# .env.example) is loaded by Docker Compose. For Kubernetes / AKS deployment
# the same env vars will be projected from Kubernetes Secrets — no code or
# config changes required.
# =============================================================================

spring:
  application:
    name: product-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blinkit_products}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---------------------------------------------------------------------------
  # Redis — Phase-1 distributed cache (cache-aside pattern, see ProductCache).
  # In Compose / AKS, REDIS_HOST resolves to the `redis` service. Locally
  # without Docker the default `localhost` lets a dev `redis-server` work.
  # Cache misses on Redis outage degrade to direct-DB reads (non-fatal).
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_SERVER_HOST:localhost}
      port: ${REDIS_SERVER_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true

# -----------------------------------------------------------------------------
# JWT / shared platform authentication
# -----------------------------------------------------------------------------
# auth.jwt.secret MUST resolve to the SAME value as auth-service and
# cart-service. The JWT_SECRET env var is the source of truth — the fallback
# below is a safe HS512-length default for local dev only and MUST NEVER be
# used in production. In AKS this value comes from a Kubernetes Secret.
# -----------------------------------------------------------------------------
auth:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1ITUFDLVNIQS01MTItYWxnb3JpdGhtLW1pbmltdW0tNjQtYnl0ZXMtbG9uZy1mb3ItcHJvZHVjdGlvbi11c2U=}

logging:
  level:
    root: INFO
    com.blinkit.productservice: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Product Catalog and Inventory Microservice
    version: 1.0.0
