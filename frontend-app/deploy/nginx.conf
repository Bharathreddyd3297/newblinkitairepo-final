# =============================================================================
# Blinkit Frontend — nginx site config
# -----------------------------------------------------------------------------
# Drops in at /etc/nginx/conf.d/default.conf inside the container.
#
# Responsibilities:
#   1. Serve the React SPA from /usr/share/nginx/html with proper SPA fallback.
#   2. Reverse-proxy /api/** into the api-gateway over the shared Docker bridge
#      network (DNS name: api-gateway), so the browser sees one origin and
#      CORS preflights disappear.
#   3. Apply production security headers + gzip + immutable asset caching.
#
# When this lifts to AKS the same conf works as-is — only the upstream block
# needs to point at the Kubernetes Service name for the gateway.
# =============================================================================

# Upstream for the api-gateway. Resolves via the Docker bridge network DNS
# (`api-gateway`). Keeping it as a named upstream means the gateway address
# is declared in exactly one place — swap to a Kubernetes ClusterIP DNS name
# (`api-gateway.blinkit.svc.cluster.local`) when moving to AKS and the rest
# of the config stays untouched.
upstream api_gateway_upstream {
    server api-gateway:8080;
    keepalive 32;
}

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # SPA root and entry document.
    root        /usr/share/nginx/html;
    index       index.html;

    # ------------------------------------------------------------------
    # Gzip compression (covers JS/CSS/HTML/JSON/SVG/font metadata).
    # nginx:alpine already loads ngx_http_gzip_module by default.
    # ------------------------------------------------------------------
    gzip               on;
    gzip_vary          on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # ------------------------------------------------------------------
    # Global security headers. These cover the static surface; the
    # api-gateway adds its own on proxied responses (see Spring Cloud
    # Gateway config) and the duplicates are harmless because we don't
    # set Strict-Transport-Security here (TLS termination is upstream).
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-Frame-Options           "DENY"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection          "0"                             always;
    # Hide nginx version in the Server header — purely cosmetic, but cheap.
    server_tokens off;

    # ------------------------------------------------------------------
    # Reverse-proxy: /api/** -> api-gateway (in-cluster, Docker DNS).
    #
    # The Vite build is produced with VITE_API_BASE_URL="" so axios uses
    # relative URLs (e.g. POST /api/auth/login). The browser sees those
    # as same-origin to the nginx host — no CORS preflight needed.
    # nginx forwards them here.
    #
    # `proxy_pass http://api_gateway_upstream;` (no trailing slash, and
    # using the upstream name) preserves the inbound URI as-is, so
    # /api/auth/login lands at /api/auth/login on the gateway. Don't
    # add a trailing slash on `proxy_pass` — it would strip the location
    # prefix and route /auth/login to a non-existent path.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api_gateway_upstream;
        proxy_http_version 1.1;

        # Pass-through identity headers so the gateway sees the real client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # JWT-bearing requests must travel exactly as-issued. Don't let nginx
        # rewrite or buffer the Authorization header.
        proxy_pass_request_headers on;

        # Disable upstream response buffering for streaming friendliness
        # (the gateway is on the same network — buffering only adds latency).
        proxy_buffering          off;
        proxy_request_buffering  off;

        # Keep the connection pool warm.
        proxy_set_header Connection "";

        # Generous read timeout because the AI recommendation cold-start
        # path can briefly take ~10s while embeddings warm up.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # The api-gateway already sets its own CORS headers. Don't add
        # them here too — `DedupeResponseHeader=… RETAIN_FIRST` upstream
        # only keeps one Access-Control-Allow-Origin, so duplicates would
        # be silently dropped, but it's cleaner not to emit them at all.
    }

    # /actuator/** is convenient for hitting health/metrics endpoints from
    # the browser during dev without leaking the gateway port to the host.
    location /actuator/ {
        proxy_pass         http://api_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
    }

    # ------------------------------------------------------------------
    # Immutable static assets (the Vite `assets/` directory).
    # Filenames are content-hashed, so 1-year immutable caching is safe.
    # ------------------------------------------------------------------
    location /assets/ {
        access_log off;
        # Try the file, otherwise fall through. We DO NOT SPA-fallback
        # for /assets/ — a missing hashed asset should 404, not return
        # a 200 with HTML that the browser then tries to parse as JS.
        try_files $uri =404;

        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Re-apply security headers (add_header inside a location overrides
        # the server-level ones, so we have to repeat them).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY"    always;
    }

    # Favicon + icons — same idea, but tolerate small drift.
    location = /favicon.svg {
        access_log off;
        expires    7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # ------------------------------------------------------------------
    # SPA shell + fallback.
    #
    # index.html is hashed by URL (`/`) and must always come from the
    # latest deploy — otherwise a stale entry would pin the user on an
    # outdated bundle. Everything else falls through to /index.html so
    # /products/:slug, /orders/:id etc. hit the React router.
    # ------------------------------------------------------------------
    # nginx's `add_header` is non-cumulative across blocks: any `add_header`
    # in a nested location REPLACES the server-level set, instead of
    # appending. So we have to repeat the full security-header bundle
    # inside each location that customises caching, otherwise the SPA
    # shell would silently lose Permissions-Policy / X-XSS-Protection /
    # nosniff and only get the per-location additions.
    location = / {
        try_files /index.html =404;
        add_header Cache-Control            "no-store, must-revalidate"        always;
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header X-Frame-Options          "DENY"                             always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        add_header X-XSS-Protection         "0"                                always;
    }

    location = /index.html {
        add_header Cache-Control            "no-store, must-revalidate"        always;
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header X-Frame-Options          "DENY"                             always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        add_header X-XSS-Protection         "0"                                always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Errors — keep them minimal; the SPA shell handles real not-founds.
    # ------------------------------------------------------------------
    error_page 500 502 503 504 /index.html;
}
