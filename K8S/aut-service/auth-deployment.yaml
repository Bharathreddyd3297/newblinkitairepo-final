# =============================================================================
# auth-service — issues JWTs, talks to Azure PostgreSQL (blinkit_auth).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: blinkit
  labels:
    app: auth-service
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
    spec:
      enableServiceLinks: false
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: auth-service
        image: blinkitaiacr.azurecr.io/auth-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8081

        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: auth-secret

        env:
        - name: JAVA_OPTS
          value: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50 -Djava.security.egd=file:/dev/./urandom"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
