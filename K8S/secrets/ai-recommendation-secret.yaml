# =============================================================================
# ai-recommendation-secret — optional internal bearer used when no inbound
# Authorization header is present (warm-up / dev). Empty by default; the
# normal flow forwards the user's JWT through the gateway.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ai-recommendation-secret
  namespace: blinkit
type: Opaque
stringData:
  INTERNAL_SERVICE_JWT: ""
