# =============================================================================
# auth-secret — auth-service env (DB + JWT issuer secret)
# -----------------------------------------------------------------------------
# auth-service is the JWT *issuer*, so JWT_SECRET MUST exactly match the
# value used by every downstream service (product, cart, order, payment) and
# the api-gateway — otherwise tokens this service signs will be rejected by
# the others and login appears to "succeed but every subsequent call 401s".
#
# DB: per-service logical database on the shared Azure PostgreSQL Flexible
# Server `blinkit-postgres`. sslmode=require is non-negotiable on Azure PG.
#
# WARNING: this file holds production credentials and must NOT be committed
# to a public repo. For prod, source these from Azure Key Vault via the CSI
# driver (workload identity) and remove the static stringData below.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: blinkit
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://blinkit-postgres.postgres.database.azure.com:5432/blinkit_auth?sslmode=require"
  SPRING_DATASOURCE_USERNAME: "pgadmin"
  SPRING_DATASOURCE_PASSWORD: "Cloud@123"
  JWT_SECRET: "blinkit-super-secure-jwt-secret-key-for-aks-deployment-2026-platform"
  JWT_EXPIRATION: "86400000"
