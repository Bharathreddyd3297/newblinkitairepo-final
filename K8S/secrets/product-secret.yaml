# =============================================================================
# product-secret — product-service env (DB + JWT validation secret)
# JWT_SECRET must match auth-service's value (HS512 verification).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: product-secret
  namespace: blinkit
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://blinkit-postgres.postgres.database.azure.com:5432/blinkit_products?sslmode=require"
  SPRING_DATASOURCE_USERNAME: "pgadmin"
  SPRING_DATASOURCE_PASSWORD: "Cloud@123"
  JWT_SECRET: "blinkit-super-secure-jwt-secret-key-for-aks-deployment-2026-platform"
