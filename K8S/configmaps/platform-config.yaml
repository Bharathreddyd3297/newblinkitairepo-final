# =============================================================================
# platform-config — non-secret env shared across services.
# Add per-service URLs here so changing the cluster wiring is one-file.
# Consumed by deployments via `envFrom: configMapRef`.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: blinkit
data:
  AUTH_SERVICE_URL: "http://auth-service:8081"
  PRODUCT_SERVICE_URL: "http://product-service:8082"
  CART_SERVICE_URL: "http://cart-service:8083"
  ORDER_SERVICE_URL: "http://order-service:8084"
  PAYMENT_SERVICE_URL: "http://payment-service:8085"
  AI_RECOMMENDATION_SERVICE_URL: "http://ai-recommendation-service:8090"

  # Base URLs in the format the JVM services already expect (app.*.base-url)
  PRODUCT_SERVICE_BASE_URL: "http://product-service:8082"
  CART_SERVICE_BASE_URL: "http://cart-service:8083"
  ORDER_SERVICE_BASE_URL: "http://order-service:8084"

  # Redis. We use the *_SERVER_* names to avoid the K8S-injected REDIS_PORT
  # collision (kubelet exposes <SVC>_PORT=tcp://... for every same-namespace
  # Service, which clobbers a plain REDIS_PORT integer at startup).
  # enableServiceLinks: false is also set on every pod for defence in depth.
  REDIS_SERVER_HOST: "redis"
  REDIS_SERVER_PORT: "6379"

  # Spring Boot profile / log level.
  SPRING_PROFILES_ACTIVE: "prod"
  LOG_LEVEL: "INFO"
