# =============================================================================
# api-gateway Service — ClusterIP. The Ingress fronts this for public traffic.
# Frontend nginx also reverse-proxies /api/** here over the cluster network.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: blinkit
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
