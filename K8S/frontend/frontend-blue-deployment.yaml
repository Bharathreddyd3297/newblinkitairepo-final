apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-blue
  namespace: blinkit
  labels:
    app: frontend
    version: blue
    tier: edge

spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: frontend
      version: blue

  template:
    metadata:
      labels:
        app: frontend
        version: blue
        tier: edge

    spec:
      enableServiceLinks: false

      imagePullSecrets:
      - name: acr-secret

      containers:
      - name: frontend

        image: blinkitaiacr.azurecr.io/frontend-app:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 80

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"

          limits:
            memory: "256Mi"
            cpu: "200m"

        startupProbe:
          tcpSocket:
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12

        livenessProbe:
          tcpSocket:
            port: 80

          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80

          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3