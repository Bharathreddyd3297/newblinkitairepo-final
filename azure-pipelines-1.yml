# =========================================================
# STAGE 3 - Deploy to AKS
# =========================================================
- stage: KubertesDeploy
  displayName: Deploy Application

  # dependsOn: Terraform

  jobs:

  - job: DeploytoAKS
    displayName: Deploy the platform

    steps:

    - checkout: self

    # =========================================================
    # Connect to AKS
    # =========================================================

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksRG) --name $(aksName) --overwrite-existing
          kubectl get nodes
    # =========================================================
    # Create namespace
    # =========================================================
    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl apply -f K8S/namespace.yaml

    # =========================================================
    # Create Secrets
    # =========================================================

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl apply -f K8S/secrets/
    # =========================================================
    # Create ConfigMaps
    # =========================================================

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl apply -f K8S/configmaps/
    # =========================================================
    # Deploy Redis
    # =========================================================

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl apply -f K8S/redis/
    # =========================================================
    # Deploy Microservices
    # =========================================================

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          kubectl apply -f K8S/aut-service/
          kubectl apply -f K8S/product-service/
          kubectl apply -f K8S/cart-service/
          kubectl apply -f K8S/order-service/
          kubectl apply -f K8S/payment-service/
          kubectl apply -f K8S/ai-recommendation-service/
          kubectl apply -f K8S/api-gateway/

          kubectl rollout status deployment/auth-service -n blinkit --timeout=300s
          kubectl rollout status deployment/product-service -n blinkit --timeout=300s
          kubectl rollout status deployment/cart-service -n blinkit --timeout=300s
          kubectl rollout status deployment/order-service -n blinkit --timeout=300s
          kubectl rollout status deployment/payment-service -n blinkit --timeout=300s
          kubectl rollout status deployment/ai-recommendation-service -n blinkit --timeout=300s
          kubectl rollout status deployment/api-gateway -n blinkit --timeout=300s
      # =========================================================
      # Deploy Microservices
      # =========================================================
    - task: AzureCLI@3
      inputs:
          connectionType: 'azureRM'
          azureSubscription: '$(azureServiceConnection)'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            kubectl apply -f K8S/frontend/
            kubectl rollout status deployment/frontend-green -n blinkit --timeout=300s

      # =========================================================
      # Deploy Microservices
      # =========================================================
    - task: AzureCLI@3
      inputs:
          connectionType: 'azureRM'
          azureSubscription: '$(azureServiceConnection)'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            kubectl get pods -n blinkit
            kubectl get svc -n blinkit
            kubectl get deployments -n blinkit

# =========================================================
# STAGE 4 - Blue Green Deployment
# =========================================================
- stage: BlueGreenDeploy
  displayName: BlueGreenDeploy

  # dependsOn: KubertesDeploy

  jobs:

  - job: DetectEnvironment
    displayName: DetectEnvironment

    steps:

    - checkout: self

    - task: AzureCLI@3
      name: detectEnv
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksRG) --name $(aksName) --overwrite-existing

          CURRENT=$(kubectl get svc frontend -n blinkit -o jsonpath='{.spec.selector.version}' 2>/dev/null || echo "green")

          if [ "$CURRENT" = "green" ]; then
            NEXT="blue"
          else
            NEXT="green"
          fi
          echo "Current Environment: $CURRENT"
          echo "NEXT environment: $NEXT"
          echo "##vso[task.setvariable variable=targetEnv;isOutput=true]$NEXT"

  - job: DeployNewEnvironment
    displayName: Deploy to target
    dependsOn: DetectEnvironment
    variables:
      targetEnv: $[ dependencies.DetectEnvironment.outputs['detectEnv.targetEnv'] ]
    steps:
    - checkout: self

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksRG) --name $(aksName) --overwrite-existing
          echo "Deploying $(targetEnv) environment"
          kubectl apply -f K8S/frontend/frontend-$(targetEnv)-deployment.yaml
          kubectl rollout restart deployment/frontend-$(targetEnv) -n blinkit
          kubectl rollout status deployment/frontend-$(targetEnv) -n blinkit --timeout=300s
          kubectl get pods -n blinkit

# =========================================================
# STAGE 5 - Switch the traffic
# =========================================================
- stage: SwitchTraffic
  displayName: SwitchTraffic

  dependsOn: BlueGreenDeploy
  variables:
      targetEnv: $[ stageDependencies.BlueGreenDeploy.DetectEnvironment.outputs['detectEnv.targetEnv'] ]

  jobs:

  - job: SwitchFrontendTraffic
    displayName: SwitchFrontendTraffic

    steps:

    - checkout: self

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksRG) --name $(aksName) --overwrite-existing

          echo "Switching the traffic to $(targetEnv)"
          kubectl patch svc frontend -n blinkit -p '{"spec":{"selector":{"app":"frontend","version":"$(targetEnv)"}}}'

          echo "Frontend Service"
          kubectl get svc frontend -n blinkit
          kubectl get svc frontend -n blinkit -o jsonpath='{.spec.selector.version}'
# =========================================================
# STAGE 5 - FinalValidation
# =========================================================
- stage: FinalValidation
  displayName: FinalValidation

  dependsOn: SwitchTraffic

  jobs:

  - job: ValidatePlatform
    displayName: ValidatePlatform

    steps:

    - checkout: self

    - task: AzureCLI@3
      inputs:
        connectionType: 'azureRM'
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksRG) --name $(aksName) --overwrite-existing
          echo "pods"
          kubectl get pods -n blinkit
          echo "services"
          kubectl get svc -n blinkit
          echo "deployments"
          kubectl get deployments -n blinkit
          echo "frontend service selector"
          kubectl get svc frontend -n blinkit -o jsonpath='{.spec.selector.version}'

