# =========================================================
# TRIGGER
# =========================================================

trigger:
- main

# =========================================================
# AGENT
# =========================================================

pool:
  vmImage: ubuntu-latest

# =========================================================
# VARIABLES
# =========================================================

variables:

  # Docker Tag
  tag: '$(Build.BuildId)'

  # Azure DevOps Service Connections
  acrServiceConnection: 'bit-acr'
  azureServiceConnection: 'scnew2'

  # AKS Details
  aksRG: 'blinkit-rg'
  aksName: 'blinkit-aks'

  # Terraform Backend
  tfStateRG: 'StatefileRG'
  tfStateStorage: 'blinkitaisfsa'
  tfStateContainer: 'statefile'
  tfStateKey: 'blinkit-aks.tfstate'

  # ACR Repositories
  frontendRepository: 'frontend-app'
  gatewayRepository: 'api-gateway'
  authRepository: 'auth-service'
  productRepository: 'product-service'
  cartRepository: 'cart-service'
  orderRepository: 'order-service'
  paymentRepository: 'payment-service'
  aiRepository: 'ai-recommendation-service'

# =========================================================
# STAGES
# =========================================================

