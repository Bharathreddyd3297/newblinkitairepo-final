# =============================================================================
# payment-service — Spring Boot configuration
# -----------------------------------------------------------------------------
# All secrets and externally-injected values are read from environment
# variables. For local development the workspace-root .env (copied from
# .env.example) is loaded by Docker Compose. For Kubernetes / AKS deployment
# the same env vars will be projected from Kubernetes Secrets / Azure Key
# Vault — no code or config changes required.
# =============================================================================

server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: payment-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blinkit_payments}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PaymentHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# -----------------------------------------------------------------------------
# JWT / shared platform authentication + downstream service wiring
# -----------------------------------------------------------------------------
# app.jwt.secret MUST resolve to the SAME value as auth-service,
# product-service, cart-service, and order-service. The JWT_SECRET env var is
# the source of truth — the fallback below is a safe HS512-length default for
# local dev only and MUST NEVER be used in production. In AKS this value
# comes from a Kubernetes Secret / Azure Key Vault.
#
# order-service.base-url drives the WebClient bean used to fetch orders and to
# update an order's status after a payment lifecycle event (see
# OrderServiceClient).
# -----------------------------------------------------------------------------
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1ITUFDLVNIQS01MTItYWxnb3JpdGhtLW1pbmltdW0tNjQtYnl0ZXMtbG9uZy1mb3ItcHJvZHVjdGlvbi11c2U=}
  order-service:
    base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:8084}
  payment:
    success-rate-percent: ${PAYMENT_SUCCESS_RATE_PERCENT:80}
  webclient:
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
    write-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.blinkit.paymentservice: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
