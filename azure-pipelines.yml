pool:
  vmImage: ubuntu-latest

variables:
  tag: '$(Build.BuildId)'

  acrServiceConnection: 'bit-acr'

  frontendRepository: 'frontend-app'
  gatewayRepository: 'api-gateway'
  authRepository: 'auth-service'
  productRepository: 'product-service'
  cartRepository: 'cart-service'
  orderRepository: 'order-service'
  paymentRepository: 'payment-service'
  aiRepository: 'ai-recommendation-service'

stages:

# =========================================================
# STAGE 1 - BUILD AND PUSH ALL CONTAINERS
# =========================================================

- stage: BuildAndPush
  displayName: Build and Push Docker Images

  jobs:

  - job: DockerBuildPush
    displayName: Build and Push Images

    steps:

