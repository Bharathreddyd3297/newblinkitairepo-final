    # FRONTEND
    # =====================================================

    - task: Docker@2
      displayName: Build & Push Frontend
      inputs:
        command: buildAndPush
        repository: $(frontendRepository)
        dockerfile: frontend-app/Dockerfile
        buildContext: frontend-app
        containerRegistry: $(acrServiceConnection)
        tags: |
          $(tag)
          latest

